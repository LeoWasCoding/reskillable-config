<html lang="en">
<head>
<meta charset="UTF-8">

<title>Reskillable Config Editor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#333;
  --text:#f0ede8;--muted:#888;--accent:#d4a017;--accent-light:#f0b429;--danger:#e05252;--success:#4caf50;
  --mining:#cd7f32;--gathering:#57ab5a;--farming:#c69026;--building:#6e7681;
  --attack:#e05252;--defense:#388bfd;--agility:#39c5cf;--magic:#bc8cff;--trading:#d4a017;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

*{scrollbar-width:thin;scrollbar-color:var(--accent) var(--surface2)}
*::-webkit-scrollbar{width:7px;height:7px}
*::-webkit-scrollbar-track{background:var(--surface2)}
*::-webkit-scrollbar-thumb{background:var(--accent)}
*::-webkit-scrollbar-thumb:hover{background:var(--accent-light)}
*::-webkit-scrollbar-corner{background:var(--surface2)}

.header{background:var(--surface);border-bottom:2px solid var(--accent);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.header-title{font-size:17px;font-weight:700;flex:1;min-width:160px;white-space:nowrap}
.header-actions{display:flex;gap:6px;flex-wrap:wrap}

.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;transition:background .15s,opacity .15s;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--border)}
.btn-primary{background:var(--accent);color:#000;border-color:transparent;font-weight:600}
.btn-primary:hover{background:var(--accent-light)}
.btn-danger{background:var(--danger);color:#fff;border-color:transparent}
.btn-danger:hover{opacity:.85}
.btn-success{background:var(--success);color:#000;border-color:transparent}
.btn-sm{padding:3px 9px;font-size:12px}
.btn-xs{padding:2px 6px;font-size:11px}

.tabs-wrapper{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs-wrapper::-webkit-scrollbar{display:none}
.tabs{display:flex;min-width:max-content;padding:0 12px}
.tab{padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:5px;user-select:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.content{padding:14px;max-width:1100px;margin:0 auto}

.section{background:var(--surface);border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.section-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;font-size:11px;font-weight:600;background:var(--bg);border:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px}
.entry-count{font-size:11px;color:var(--muted);font-weight:normal}

.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:7px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
td{padding:7px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(212,160,23,.04)}
.empty-row td{text-align:center;color:var(--muted);font-size:12px;padding:20px}

.id-cell{font-family:'Consolas','SF Mono',monospace;font-size:12px}
.ns{color:var(--muted)}

.skill-pill{display:inline-flex;align-items:center;padding:2px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.s-mining{background:rgba(205,127,50,.18);color:var(--mining)}
.s-gathering{background:rgba(87,171,90,.18);color:var(--gathering)}
.s-farming{background:rgba(198,144,38,.18);color:var(--farming)}
.s-building{background:rgba(110,118,129,.18);color:var(--building)}
.s-attack{background:rgba(248,81,73,.18);color:var(--attack)}
.s-defense{background:rgba(56,139,253,.18);color:var(--defense)}
.s-agility{background:rgba(57,197,207,.18);color:var(--agility)}
.s-magic{background:rgba(188,140,255,.18);color:var(--magic)}
.s-trading{background:rgba(227,179,65,.18);color:var(--trading)}

.lvl{font-weight:700;font-size:13px}
.ms{font-size:10px;color:var(--muted);margin-left:3px}

.cond-list{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.cond-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;font-size:11px;border:1px solid var(--border);background:var(--bg)}
.cond-sep{font-size:10px;color:var(--muted);font-weight:700}

.add-group-row{padding:10px 14px;border-top:1px solid var(--border)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:15px;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 6px;line-height:1}
.modal-close:hover{color:var(--text);background:var(--border)}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface)}

.form-group{display:flex;flex-direction:column;gap:5px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:12px;font-weight:600;color:var(--muted)}
.field-hint{font-size:11px;color:var(--muted);font-weight:normal;margin-left:4px}
input[type=text],input[type=number],select,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;font-size:13px;font-family:inherit;width:100%;transition:border-color .15s}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.level-row{display:grid;grid-template-columns:80px 1fr;gap:8px;align-items:center}

.cond-editor-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 8px;background:var(--bg);border:1px solid var(--border);margin-bottom:6px}
.cond-editor-row .and-badge{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;min-width:28px}
.cond-editor-row select{flex:0 0 130px}
.cond-editor-row input[type=number]{flex:0 0 70px;width:70px}

.toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border);padding:10px 14px;font-size:13px;z-index:1000;animation:fadeUp .2s ease;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--danger);color:var(--danger)}
@keyframes fadeUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

.lock-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lock-type-option{padding:10px 12px;border:2px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;transition:border-color .15s,background .15s;text-align:center}
.lock-type-option:hover{border-color:var(--accent);background:rgba(212,160,23,.08)}
.lock-type-option.selected{border-color:var(--accent);background:rgba(212,160,23,.15);color:var(--accent)}
.lock-type-option small{display:block;font-weight:400;color:var(--muted);font-size:11px;margin-top:3px}

@media(max-width:560px){
  .form-row{grid-template-columns:1fr}
  .level-row{grid-template-columns:70px 1fr}
  .lock-type-grid{grid-template-columns:1fr}
  th,td{padding:6px 8px}
  .header-title{font-size:14px}
  .tabs .tab{padding:9px 10px;font-size:12px}
}
.online-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--border);background:var(--surface2);font-size:12px;color:var(--muted);white-space:nowrap}
.online-dot{width:8px;height:8px;background:var(--success);flex-shrink:0;animation:blink 2s infinite}
.online-dot.offline{background:var(--muted);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

<body>

<header class="header">
  <div class="header-title"><i class="bi bi-gear-fill"></i> Reskillable Config Editor</div>
  <div class="online-badge"><span class="online-dot offline" id="onlineDot"></span><span id="onlineCount">—</span> online</div>
  <div class="header-actions">
    <button class="btn" onclick="loadDefault()"><i class="bi bi-arrow-counterclockwise"></i> Default</button>
    <label for="fileInput" class="btn" style="cursor:pointer"><i class="bi bi-upload"></i> Upload JS</label>
    <input type="file" id="fileInput" accept=".js" style="display:none" onchange="handleFileUpload(event)">
    <label for="mcaddonInput" class="btn" style="cursor:pointer"><i class="bi bi-archive-fill"></i> Upload MCADDON</label>
    <input type="file" id="mcaddonInput" accept=".mcaddon" style="display:none" onchange="handleMcaddonUpload(event)">
    <button class="btn btn-primary" onclick="exportJS()"><i class="bi bi-download"></i> Export JS</button>
    <button class="btn btn-success" id="exportMcaddonBtn" onclick="exportMcaddon()" style="display:none"><i class="bi bi-box-arrow-up"></i> Export MCADDON</button>
  </div>
</header>

<div class="tabs-wrapper"><div class="tabs" id="tabsBar"></div></div>

<main class="content" id="mainContent"></main>

<div class="modal-overlay" id="entryModal" onclick="if(event.target===this)closeEntryModal()">
  <div class="modal">
    <div class="modal-header">
      <span id="entryModalTitle">Edit Entry</span>
      <button class="modal-close" onclick="closeEntryModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body" id="entryModalBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEntryModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEntryModal()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="groupModal" onclick="if(event.target===this)closeGroupModal()">
  <div class="modal">
    <div class="modal-header">
      <span>Add Lock Group</span>
      <button class="modal-close" onclick="closeGroupModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Lock Type</label>
        <div class="lock-type-grid" id="lockTypeGrid">
          <div class="lock-type-option selected" data-type="item" onclick="selectLockType('item')">
            Item Lock <small>Require skill to use/hold item</small>
          </div>
          <div class="lock-type-option" data-type="blockBreak" onclick="selectLockType('blockBreak')">
            Block Break Lock <small>Require skill to break block</small>
          </div>
          <div class="lock-type-option" data-type="blockPlace" onclick="selectLockType('blockPlace')">
            Block Place Lock <small>Require skill to place block</small>
          </div>
          <div class="lock-type-option" data-type="entity" onclick="selectLockType('entity')">
            Entity Lock <small>Require skill to interact with entity</small>
          </div>
          <div class="lock-type-option" data-type="advancedItem" onclick="selectLockType('advancedItem')">
            Advanced Item Lock <small>Multi-skill requirements (AND)</small>
          </div>
        </div>
      </div>
      <div class="form-group" id="groupCatField">
        <label>Category <span class="field-hint">(e.g. tools, armor, weapons, other, magic, shield)</span></label>
        <input type="text" id="groupCatInput" placeholder="tools">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeGroupModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddGroup()">Add Group</button>
    </div>
  </div>
</div>

let appData = deepClone(DEFAULT_DATA);
let activeTab = 'mining';
let entryModalCb = null;
let pendingGroupSection = null;
let selectedLockType = 'item';

function deepClone(o){return JSON.parse(JSON.stringify(o))}
function ms(level){return MILESTONES[level]||''}
function conditionsToReq(conds){return conds.map(c=>`reskillable:${c.skillId}|${c.level}`).join(' & ')}
function reqToConditions(req){
  return req.split(' & ').map(part=>{
    const m=part.match(/reskillable:(\w+)\|(\d+)/);
    return m?{skillId:m[1],level:parseInt(m[2])}:null;
  }).filter(Boolean);
}
function skillPill(skillId){return`<span class="skill-pill s-${skillId}">${skillId}</span>`}
function levelBadge(level){const m=ms(level);return`<span class="lvl">${level}</span>${m?`<span class="ms">${m}</span>`:''}`}
function renderID(id){
  const prefix='minecraft:';
  if(id.startsWith(prefix)) return`<span class="ns">minecraft:</span>${id.slice(prefix.length)}`;
  return`<span>${id}</span>`;
}
function skillOptions(selected='mining'){
  return SKILLS.map(s=>`<option value="${s}"${s===selected?' selected':''}>${s}</option>`).join('');
}
function msOptions(selected){
  return`<option value="">— Milestone —</option>`+
    Object.entries(MILESTONES).map(([lvl,name])=>`<option value="${lvl}"${parseInt(lvl)===selected?' selected':''}>${name} (${lvl})</option>`).join('');
}

function render(){
  renderTabs();
  renderContent();
}

function renderTabs(){
  document.getElementById('tabsBar').innerHTML=SECTIONS.map(s=>`
    <div class="tab${activeTab===s.id?' active':''}" onclick="switchTab('${s.id}')">
      ${SKILL_ICONS[s.id]||''} ${s.name}
    </div>`).join('');
}

function renderContent(){
  const groups=appData[activeTab]||[];
  const sec=SECTIONS.find(s=>s.id===activeTab);
  let html=groups.map((g,gi)=>renderGroup(g,gi)).join('');
  html+=`<div style="margin-top:8px"><button class="btn" onclick="openAddGroupModal('${activeTab}')"><i class="bi bi-plus-lg"></i> Add Lock Group</button></div>`;
  document.getElementById('mainContent').innerHTML=html;
}

function renderGroup(group,gi){
  const isAdv=group.lockType==='advancedItem';
  const colCount=isAdv?3:4;
  const catBadge=group.category?`<span class="badge">${group.category}</span>`:'';
  const rows=group.entries.length
    ?group.entries.map((e,ei)=>renderRow(e,gi,ei,isAdv)).join('')
    :`<tr class="empty-row"><td colspan="${colCount}">No entries — click "+ Add Entry" to add one.</td></tr>`;
  return`
<div class="section">
  <div class="section-header">
    <div class="section-title">
      ${LOCK_LABELS[group.lockType]||group.lockType} ${catBadge}
      <span class="entry-count">(${group.entries.length})</span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm" onclick="addEntry(${gi})"><i class="bi bi-plus-lg"></i> Add Entry</button>
      <button class="btn btn-sm btn-danger" onclick="deleteGroup(${gi})"><i class="bi bi-trash"></i> Remove Group</button>
    </div>
  </div>
  <div class="table-wrapper">
    <table>
      <thead><tr>
        <th style="min-width:220px">${LOCK_ID_LABEL[group.lockType]||'ID'}</th>
        ${isAdv
          ?'<th>Requirements <span style="font-weight:400;text-transform:none;letter-spacing:0">(must meet ALL)</span></th>'
          :'<th style="min-width:110px">Skill</th><th style="min-width:90px">Level</th>'}
        <th style="width:100px">Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
</div>`;
}

function renderRow(entry,gi,ei,isAdv){
  if(isAdv){
    const chips=entry.conditions.map((c,ci)=>
      `${ci>0?'<span class="cond-sep">AND</span>':''}<span class="cond-chip">${skillPill(c.skillId)} ${levelBadge(c.level)}</span>`
    ).join('');
    return`<tr>
      <td class="id-cell">${renderID(entry.id)}</td>
      <td><div class="cond-list">${chips}</div></td>
      <td><button class="btn btn-xs" onclick="editEntry(${gi},${ei})"><i class="bi bi-pencil"></i></button> <button class="btn btn-xs btn-danger" onclick="deleteEntry(${gi},${ei})"><i class="bi bi-trash"></i></button></td>
    </tr>`;
  }else{
    return`<tr>
      <td class="id-cell">${renderID(entry.id)}</td>
      <td>${skillPill(entry.skillId)}</td>
      <td>${levelBadge(entry.level)}</td>
      <td><button class="btn btn-xs" onclick="editEntry(${gi},${ei})"><i class="bi bi-pencil"></i></button> <button class="btn btn-xs btn-danger" onclick="deleteEntry(${gi},${ei})"><i class="bi bi-trash"></i></button></td>
    </tr>`;
  }
}

function switchTab(id){activeTab=id;render()}

function editEntry(gi,ei){
  const group=appData[activeTab][gi];
  const entry=group.entries[ei];
  const isAdv=group.lockType==='advancedItem';
  document.getElementById('entryModalTitle').textContent='Edit Entry';
  document.getElementById('entryModalBody').innerHTML=isAdv?buildAdvForm(deepClone(entry)):buildSimpleForm(deepClone(entry));
  entryModalCb=(updated)=>{group.entries[ei]=updated;renderContent();showToast('Entry updated','success')};
  document.getElementById('entryModal').classList.add('show');
  document.getElementById('entry-id').focus();
}

function addEntry(gi){
  const group=appData[activeTab][gi];
  const isAdv=group.lockType==='advancedItem';
  const blank=isAdv?{id:'minecraft:',conditions:[{skillId:'mining',level:1}]}:{id:'minecraft:',skillId:'mining',level:1};
  document.getElementById('entryModalTitle').textContent='Add Entry';
  document.getElementById('entryModalBody').innerHTML=isAdv?buildAdvForm(blank):buildSimpleForm(blank);
  entryModalCb=(created)=>{group.entries.push(created);renderContent();showToast('Entry added','success')};
  document.getElementById('entryModal').classList.add('show');
  document.getElementById('entry-id').focus();
}

function deleteEntry(gi,ei){
  if(!confirm('Remove this entry?'))return;
  appData[activeTab][gi].entries.splice(ei,1);
  renderContent();showToast('Entry removed');
}

function deleteGroup(gi){
  if(!confirm('Remove this entire lock group?'))return;
  appData[activeTab].splice(gi,1);
  renderContent();showToast('Group removed');
}

function buildSimpleForm(entry){
  return`
<div class="form-group">
  <label>${LOCK_ID_LABEL.item} <span class="field-hint">(e.g. minecraft:iron_sword)</span></label>
  <input type="text" id="entry-id" value="${entry.id}" placeholder="minecraft:item_name">
</div>
<div class="form-row">
  <div class="form-group">
    <label>Skill</label>
    <select id="entry-skill">${skillOptions(entry.skillId)}</select>
  </div>
  <div class="form-group">
    <label>Level <span class="field-hint">(1–32)</span></label>
    <div class="level-row">
      <input type="number" id="entry-level" value="${entry.level}" min="1" max="32" oninput="syncMilestone(this.value,'entry-ms')">
      <select id="entry-ms" onchange="document.getElementById('entry-level').value=this.value;syncMilestone(this.value,'entry-ms')">
        ${msOptions(entry.level)}
      </select>
    </div>
  </div>
</div>`;
}

function buildAdvForm(entry){
  const conds=entry.conditions.map((c,i)=>buildCondRow(c,i)).join('');
  return`
<div class="form-group">
  <label>Item ID <span class="field-hint">(e.g. minecraft:netherite_sword)</span></label>
  <input type="text" id="entry-id" value="${entry.id}" placeholder="minecraft:item_name">
</div>
<div class="form-group">
  <label>Requirements <span class="field-hint">— player must meet ALL of these</span></label>
  <div id="cond-container">${conds}</div>
  <button type="button" class="btn btn-sm" style="margin-top:6px" onclick="addCondRow()"><i class="bi bi-plus-lg"></i> Add Condition</button>
</div>`;

function buildCondRow(cond,i){
  return`<div class="cond-editor-row" id="cr-${i}">
  <span class="and-badge">${i===0?'':'AND'}</span>
  <select class="cond-skill">${skillOptions(cond.skillId)}</select>
  <input type="number" class="cond-level" value="${cond.level}" min="1" max="32"
    oninput="syncMilestone(this.value,this.nextElementSibling)">
  <select class="cond-ms" onchange="this.previousElementSibling.value=this.value;syncMilestone(this.value,this)">
    ${msOptions(cond.level)}
  </select>
  <button type="button" class="btn btn-xs btn-danger" onclick="removeCondRow(this)"><i class="bi bi-x-lg"></i></button>
</div>`;
}

function addCondRow(){
  const c=document.getElementById('cond-container');
  const i=c.querySelectorAll('.cond-editor-row').length;
  c.insertAdjacentHTML('beforeend',buildCondRow({skillId:'mining',level:1},i));
}

function removeCondRow(btn){
  const rows=document.querySelectorAll('.cond-editor-row');
  if(rows.length<=1){showToast('Need at least one condition','error');return}
  btn.closest('.cond-editor-row').remove();

  document.querySelectorAll('.cond-editor-row').forEach((row,i)=>{
    const badge=row.querySelector('.and-badge');
    if(badge) badge.textContent=i===0?'':'AND';
  });
}

function syncMilestone(val, targetOrId){
  const sel=typeof targetOrId==='string'?document.getElementById(targetOrId):targetOrId;
  if(!sel) return;
  sel.value=MILESTONES[parseInt(val)]?String(val):'';
}

function saveEntryModal(){
  const isAdv=!!document.getElementById('cond-container');
  const id=(document.getElementById('entry-id').value||'').trim();
  if(!id){showToast('ID is required','error');return}
  let updated;
  if(isAdv){
    const rows=document.querySelectorAll('.cond-editor-row');
    const conditions=Array.from(rows).map(row=>({
      skillId:row.querySelector('.cond-skill').value,
      level:parseInt(row.querySelector('.cond-level').value)||1
    }));
    updated={id,conditions};
  }else{
    updated={
      id,
      skillId:document.getElementById('entry-skill').value,
      level:parseInt(document.getElementById('entry-level').value)||1
    };
  }
  const cb=entryModalCb;
  closeEntryModal();
  if(cb) cb(updated);
}

function closeEntryModal(){
  document.getElementById('entryModal').classList.remove('show');
  entryModalCb=null;
}

function openAddGroupModal(sectionId){
  pendingGroupSection=sectionId;
  selectedLockType='item';
  document.getElementById('groupCatInput').value='';
  document.querySelectorAll('.lock-type-option').forEach(el=>{
    el.classList.toggle('selected',el.dataset.type==='item');
  });
  updateGroupCatVisibility();
  document.getElementById('groupModal').classList.add('show');
}

function selectLockType(type){
  selectedLockType=type;
  document.querySelectorAll('.lock-type-option').forEach(el=>{
    el.classList.toggle('selected',el.dataset.type===type);
  });
  updateGroupCatVisibility();
}

function updateGroupCatVisibility(){
  const show=selectedLockType==='item'||selectedLockType==='advancedItem';
  document.getElementById('groupCatField').style.display=show?'':'none';
}

function confirmAddGroup(){
  const cat=document.getElementById('groupCatInput').value.trim()||undefined;
  const newGroup={
    id:`${pendingGroupSection}_${selectedLockType}_${Date.now()}`,
    lockType:selectedLockType,
    entries:[]
  };
  if(cat&&(selectedLockType==='item'||selectedLockType==='advancedItem')) newGroup.category=cat;
  if(!appData[pendingGroupSection]) appData[pendingGroupSection]=[];
  appData[pendingGroupSection].push(newGroup);
  closeGroupModal();
  if(activeTab===pendingGroupSection) renderContent();
  showToast('Lock group added','success');
}

function closeGroupModal(){
  document.getElementById('groupModal').classList.remove('show');
}

function handleFileUpload(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=parseJSFile(ev.target.result);
      const total=Object.values(parsed).flat().reduce((n,g)=>n+g.entries.length,0);
      if(total===0) throw new Error('No entries found — check file format');
      appData=parsed;
      render();
      showToast(`Loaded: ${total} entries across ${Object.values(parsed).flat().length} groups`,'success');
    }catch(err){
      showToast('Parse error: '+err.message,'error');
      console.error(err);
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

let _mcaddonZip=null,_mcaddonFilename='',_mcaddonInfo=null;

async function handleMcaddonUpload(e){
  const file=e.target.files[0];
  if(!file) return;
  e.target.value='';
  try{
    const zip=await JSZip.loadAsync(file);

    // Collect all manifest.json paths
    const manifestEntries=[];
    zip.forEach((path,entry)=>{
      if(!entry.dir&&path.split('/').pop()==='manifest.json') manifestEntries.push({path,entry});
    });
    if(manifestEntries.length===0){showToast('No manifest.json found in .mcaddon','error');return;}

    // Prefer the behavior pack manifest (has a module of type data or script)
    let bpManifest=null,bpFolder='';
    for(const mf of manifestEntries){
      let parsed;
      try{parsed=JSON.parse(await mf.entry.async('string'));}catch{continue;}
      const mods=parsed.modules||[];
      if(mods.some(m=>m.type==='data'||m.type==='script')){
        bpManifest=parsed;
        bpFolder=mf.path.includes('/')?mf.path.split('/').slice(0,-1).join('/'):'';
        break;
      }
    }
    // Fall back to first manifest if no BP found
    if(!bpManifest){
      bpManifest=JSON.parse(await manifestEntries[0].entry.async('string'));
      bpFolder=manifestEntries[0].path.includes('/')?manifestEntries[0].path.split('/').slice(0,-1).join('/'):'';
    }

    const addonName=bpManifest.header?.name||file.name.replace(/\.mcaddon$/i,'');
    const ver=bpManifest.header?.version;
    const versionStr=Array.isArray(ver)?ver.join('.'):String(ver??'?');

    // Find DefaultLocks.js anywhere in the zip
    let defaultLocksPath=null;
    zip.forEach((path,entry)=>{
      if(!entry.dir&&path.split('/').pop()==='DefaultLocks.js') defaultLocksPath=path;
    });

    _mcaddonZip=zip;
    _mcaddonFilename=file.name;

    if(!defaultLocksPath){
      // DefaultLocks.js missing — store a fallback path for export but don't load config
      const fallback=bpFolder?`${bpFolder}/scripts/DefaultLocks.js`:'scripts/DefaultLocks.js';
      _mcaddonInfo={name:addonName,version:versionStr,defaultLocksPath:fallback,missing:true};
      document.getElementById('exportMcaddonBtn').style.display='';
      showToast(`${addonName} v${versionStr} — DefaultLocks.js not found in this pack. You can still export after configuring.`,'error');
      return;
    }

    // Parse DefaultLocks.js
    const jsContent=await zip.file(defaultLocksPath).async('string');
    const parsed=parseJSFile(jsContent);
    const total=Object.values(parsed).flat().reduce((n,g)=>n+g.entries.length,0);
    if(total===0) throw new Error('No entries found in DefaultLocks.js');
    appData=parsed;
    render();

    _mcaddonInfo={name:addonName,version:versionStr,defaultLocksPath,missing:false};
    document.getElementById('exportMcaddonBtn').style.display='';
    showToast(`Loaded: ${addonName} v${versionStr} — ${total} entries across ${Object.values(parsed).flat().length} groups`,'success');
  }catch(err){
    showToast('MCADDON error: '+err.message,'error');
    console.error(err);
  }
}

async function exportMcaddon(){
  if(!_mcaddonZip||!_mcaddonInfo){showToast('No MCADDON loaded','error');return;}
  try{
    _mcaddonZip.file(_mcaddonInfo.defaultLocksPath,generateJS());
    const blob=await _mcaddonZip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=_mcaddonFilename;a.click();
    URL.revokeObjectURL(url);
    showToast(`${_mcaddonFilename} exported!`,'success');
  }catch(err){
    showToast('Export error: '+err.message,'error');
    console.error(err);
  }
}

function loadDefault(){
  appData=deepClone(DEFAULT_DATA);
  render();
  showToast('Default config loaded','success');
}

function parseJSFile(content){
  const result={};
  const map={
    mining:'registerMiningLocks',gathering:'registerGatheringLocks',
    farming:'registerFarmingLocks',building:'registerBuildingLocks',
    attack:'registerAttackLocks',defense:'registerDefenseLocks',
    agility:'registerAgilityLocks',magic:'registerMagicLocks',trading:'registerTradingLocks',
  };
  for(const[sid,mname] of Object.entries(map)){
    const body=extractMethodBody(content,mname);
    result[sid]=body?parseMethodBody(body,sid):[];
  }
  return result;
}

function extractMethodBody(content,methodName){
  const idx=content.indexOf(`static ${methodName}()`);
  if(idx===-1) return null;
  let depth=0,start=-1;
  for(let i=idx;i<content.length;i++){
    if(content[i]==='{'){if(start===-1)start=i;depth++}
    else if(content[i]==='}'){depth--;if(depth===0)return content.slice(start+1,i)}
  }
  return null;
}

function parseMethodBody(body,sid){
  const groups=[];
  const callRe=/this\.(register\w+)\s*\(/g;
  let m;
  while((m=callRe.exec(body))!==null){
    const name=m[1];
    const openParen=m.index+m[0].length-1;
    const args=extractCallArgs(body,openParen);
    if(!args) continue;
    if(['registerItemLocks','registerBlockBreakLocks','registerBlockPlaceLocks','registerEntityLocks'].includes(name)){
      const lt=name==='registerItemLocks'?'item':name==='registerBlockBreakLocks'?'blockBreak':name==='registerBlockPlaceLocks'?'blockPlace':'entity';
      const{arr,cat}=parseSimpleArgs(args);
      const entries=arr.map(parseSimpleEntry).filter(Boolean);
      const g={id:`${sid}_${lt}_${groups.length}`,lockType:lt,entries};
      if(cat) g.category=cat;
      groups.push(g);
    }else if(name==='registerAdvancedItemLocks'){
      const{arr,cat}=parseSimpleArgs(args);
      const entries=arr.map(parseAdvEntry).filter(Boolean);
      const g={id:`${sid}_adv_${groups.length}`,lockType:'advancedItem',entries};
      if(cat) g.category=cat;
      groups.push(g);
    }
  }
  return groups;
}

function extractCallArgs(content,openParen){
  let depth=0;
  for(let i=openParen;i<content.length;i++){
    if(content[i]==='(') depth++;
    else if(content[i]===')'){depth--;if(depth===0) return content.slice(openParen+1,i)}
  }
  return null;
}

function parseSimpleArgs(args){
  const arrStart=args.indexOf('[');
  if(arrStart===-1) return{arr:[],cat:null};
  const arrContent=extractBracketContent(args,arrStart);
  if(arrContent===null) return{arr:[],cat:null};
  const arrEnd=arrStart+arrContent.length+2;
  const after=args.slice(arrEnd);
  const catM=after.match(/["'](\w+)["']/);
  return{arr:parseOuterArray(arrContent),cat:catM?catM[1]:null};
}

function extractBracketContent(content,openPos){
  let depth=0;
  for(let i=openPos;i<content.length;i++){
    if(content[i]==='[') depth++;
    else if(content[i]===']'){depth--;if(depth===0) return content.slice(openPos+1,i)}
  }
  return null;
}

function parseOuterArray(content){
  const results=[];
  let i=0;
  while(i<content.length){
    if(content[i]==='['){
      const inner=extractBracketContent(content,i);
      if(inner!==null){results.push(parseInnerArray(inner));i+=inner.length+2}
      else i++;
    }else i++;
  }
  return results;
}

function parseInnerArray(content){
  const tokens=[];let i=0;
  while(i<content.length){
    const c=content[i];
    if(c===' '||c==='\n'||c==='\r'||c==='\t'||c===','){i++;continue}
    if(c==='"'||c==="'"){
      let j=i+1;while(j<content.length&&content[j]!==c)j++;
      tokens.push(content.slice(i+1,j));i=j+1;
    }else if(c>='0'&&c<='9'){
      let j=i;while(j<content.length&&content[j]>='0'&&content[j]<='9')j++;
      tokens.push(parseInt(content.slice(i,j)));i=j;
    }else i++;
  }
  return tokens;
}

function parseSimpleEntry(t){
  if(t.length<3) return null;
  const[id,skillId,level]=t;
  if(typeof id!=='string'||typeof skillId!=='string') return null;
  return{id:String(id),skillId:String(skillId),level:parseInt(level)||1};
}

function parseAdvEntry(t){
  if(t.length<2) return null;
  const[id,req]=t;
  if(typeof id!=='string'||typeof req!=='string') return null;
  const conditions=reqToConditions(req);
  if(!conditions.length) return null;
  return{id:String(id),conditions};
}

function exportJS(){
  const js=generateJS();
  const blob=new Blob([js],{type:'text/javascript'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='DefaultLocks.js';a.click();
  URL.revokeObjectURL(url);
  showToast('DefaultLocks.js exported!','success');
}

function generateJS(){
  const order=['mining','gathering','farming','building','attack','defense','agility','magic','trading'];
  const methods=order.map(sid=>{
    const mname=`register${sid.charAt(0).toUpperCase()+sid.slice(1)}Locks`;
    const groups=appData[sid]||[];
    const body=groups.map(genGroupCall).join('\n');
    return`  static ${mname}() {\n${body||'    // empty'}\n  }`;
  }).join('\n');

  return`import { LOCKS } from "./LockManager.js";
export class DefaultLocks {
  static MIN_LEVEL = 1;
  static MAX_LEVEL = 32;
  static MILESTONES = Object.freeze({
    STARTER: 1,
    NOVICE: 4,
    APPRENTICE: 6,
    JOURNEYMAN: 9,
    ADEPT: 11,
    SPECIALIST: 16,
    EXPERT: 20,
    MASTER: 24,
    GRANDMASTER: 28,
    LEGEND: 32,
  });
  static resolveLevel(level) {
    if (typeof level === "string") {
      const key = level.trim().toUpperCase();
      if (Object.prototype.hasOwnProperty.call(this.MILESTONES, key)) {
        return this.MILESTONES[key];
      }
    }
    return Math.trunc(Number(level) || this.MIN_LEVEL);
  }
  static sortRows(rows) {
    return [...rows].sort((a, b) => {
      const levelDiff = this.resolveLevel(a[2]) - this.resolveLevel(b[2]);
      if (levelDiff !== 0) {
        return levelDiff;
      }
      return String(a[0]).localeCompare(String(b[0]));
    });
  }
  static req(skillId, level) {
    const resolved = this.resolveLevel(level);
    const normalized = Math.max(
      this.MIN_LEVEL,
      Math.min(this.MAX_LEVEL, resolved),
    );
    return \`reskillable:\${skillId}|\${normalized}\`;
  }
  static registerItemLocks(rows, category) {
    for (const [itemId, skillId, level] of this.sortRows(rows)) {
      LOCKS.registerItemLock(itemId, this.req(skillId, level), category);
    }
  }
  static registerBlockBreakLocks(rows) {
    for (const [blockId, skillId, level] of this.sortRows(rows)) {
      LOCKS.registerBlockBreakLock(blockId, this.req(skillId, level));
    }
  }
  static registerBlockPlaceLocks(rows) {
    for (const [blockId, skillId, level] of this.sortRows(rows)) {
      LOCKS.registerBlockPlaceLock(blockId, this.req(skillId, level));
    }
  }
  static registerEntityLocks(rows) {
    for (const [entityId, skillId, level] of this.sortRows(rows)) {
      LOCKS.registerEntityLock(entityId, this.req(skillId, level));
    }
  }
  static registerAdvancedItemLocks(entries, category) {
    for (const [itemId, requirement] of entries) {
      LOCKS.registerItemLock(itemId, requirement, category);
    }
  }
  static register() {
    this.registerMiningLocks();
    this.registerGatheringLocks();
    this.registerFarmingLocks();
    this.registerBuildingLocks();
    this.registerAttackLocks();
    this.registerDefenseLocks();
    this.registerAgilityLocks();
    this.registerMagicLocks();
    this.registerTradingLocks();
  }
${methods}
}`;
}

function genGroupCall(group){
  const I='    ',II='      ';
  if(group.lockType==='item'){
    const rows=group.entries.map(e=>`${II}["${e.id}", "${e.skillId}", ${e.level}],`).join('\n');
    const cat=group.category?`,\n${I}"${group.category}"`:',';
    return`${I}this.registerItemLocks(\n${I}[\n${rows||II+'// empty'}\n${I}]${cat}\n${I});`;
  }else if(group.lockType==='blockBreak'){
    const rows=group.entries.map(e=>`${II}["${e.id}", "${e.skillId}", ${e.level}],`).join('\n');
    return`${I}this.registerBlockBreakLocks([\n${rows||II+'// empty'}\n${I}]);`;
  }else if(group.lockType==='blockPlace'){
    const rows=group.entries.map(e=>`${II}["${e.id}", "${e.skillId}", ${e.level}],`).join('\n');
    return`${I}this.registerBlockPlaceLocks([\n${rows||II+'// empty'}\n${I}]);`;
  }else if(group.lockType==='entity'){
    const rows=group.entries.map(e=>`${II}["${e.id}", "${e.skillId}", ${e.level}],`).join('\n');
    return`${I}this.registerEntityLocks([\n${rows||II+'// empty'}\n${I}]);`;
  }else if(group.lockType==='advancedItem'){
    const rows=group.entries.map(e=>`${II}["${e.id}", "${conditionsToReq(e.conditions)}"],`).join('\n');
    const cat=group.category?`,\n${I}"${group.category}"`:',';
    return`${I}this.registerAdvancedItemLocks(\n${I}[\n${rows||II+'// empty'}\n${I}]${cat}\n${I});`;
  }
  return '';
}

let _toastTimer;
function showToast(msg,type=''){
  clearTimeout(_toastTimer);
  const old=document.getElementById('_toast');
  if(old) old.remove();
  const t=document.createElement('div');
  t.id='_toast';t.className='toast '+(type||'');t.textContent=msg;
  document.body.appendChild(t);
  _toastTimer=setTimeout(()=>t.remove(),2600);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeEntryModal();closeGroupModal();
  }
  if((e.key==='Enter')&&document.getElementById('entryModal').classList.contains('show')&&e.ctrlKey){
    saveEntryModal();
  }
});

function initPresence(){
  try{
    if(FIREBASE_CONFIG.apiKey.startsWith('REPLACE')) return;
    const app=firebase.apps.length?firebase.app():firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.firestore();
    const col=db.collection('presence');
    const sessionId=Math.random().toString(36).slice(2)+Date.now();
    const ref=col.doc(sessionId);
    const TS=firebase.firestore.FieldValue.serverTimestamp;

    ref.set({lastSeen:TS()})
      .then(()=>console.log('[presence] session registered:',sessionId))
      .catch(e=>console.error('[presence] write failed:',e.message));

    const heartbeat=setInterval(()=>ref.update({lastSeen:TS()}),30000);

    col.onSnapshot(
      snap=>{
        console.log('[presence] count:',snap.size, snap.docs.map(d=>d.id));
        document.getElementById('onlineCount').textContent=snap.size;
        document.getElementById('onlineDot').className='online-dot';
      },
      err=>console.error('[presence] snapshot failed:',err.message)
    );

    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='visible') ref.update({lastSeen:TS()});
    });

    const cleanup=()=>{clearInterval(heartbeat);ref.delete()};
    window.addEventListener('beforeunload',cleanup);
    window.addEventListener('pagehide',e=>{if(!e.persisted) cleanup()});
  }catch(e){
    console.warn('Firebase presence error:',e.message);
  }
}

loadDefault();
initPresence();
</script>
